version: "3.9"

services:
  db:
    image: docker.io/postgres:16-alpine
    container_name: netops-db
    environment:
      POSTGRES_DB: netops
      POSTGRES_USER: netops
      POSTGRES_PASSWORD: netops
    ports:
      - "5432:5432"
    volumes:
      - netops-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netops -d netops"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api/NetOps.Api
      dockerfile: Dockerfile
    container_name: netops-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Database__Provider: Postgres
      ConnectionStrings__Default: "Host=db;Database=netops;Username=netops;Password=netops"
    ports:
      - "5102:8080"

volumes:
  netops-db-data:
